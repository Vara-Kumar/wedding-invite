<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vara Kumar & Sushma | Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --emerald: #012e23;
            --gold: #c5a059;
            --champagne: #fdfbf4;
            --soft-text: #4a4a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%;
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            background: radial-gradient(circle at center, #023d2f, #012e23);
            perspective: 2000px;
        }

        #lantern-field { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .lantern {
            position: absolute; background: rgba(197, 160, 89, 0.15);
            border-radius: 50%; 
            animation: floatUp var(--d) ease-in-out infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) translateZ(0); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-20vh) translateZ(100px); opacity: 0; }
        }

        .wrapper { 
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }

        /* --- ENVELOPE (BACKLIT) --- */
        .envelope {
            position: relative; width: 95%; max-width: 500px; height: 340px; 
            background: #01362a;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); cursor: pointer;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(197, 160, 89, 0.1);
            z-index: 15;
        }
        .envelope:hover { box-shadow: 0 0 45px rgba(197, 160, 89, 0.6); }
        .envelope.open { transform: translateY(120vh) scale(0.8); opacity: 0; pointer-events: none; }
        
        .envelope-flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #012e23; clip-path: polygon(0 0, 50% 55%, 100% 0); z-index: 3;
            transition: background 0.5s ease;
        }

        .seal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--gold);
            border-radius: 50%; z-index: 4; display: flex; align-items: center;
            justify-content: center; overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.3);
        }
        .seal img { width: 85%; height: 85%; object-fit: contain; }

        /* --- TRI-FOLD ANIMATION --- */
        .card-container {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 96vw; max-width: 650px; height: 94vh;
            z-index: 20; visibility: hidden; opacity: 0;
            transition: visibility 0s 1s, opacity 0.5s;
            transform-style: preserve-3d;
        }
        .card-container.reveal { visibility: visible; opacity: 1; transition: opacity 0.5s; }

        .fold {
            width: 100%; height: 33.33%;
            background: var(--champagne);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.02);
            position: relative;
        }

        .fold-top { transform-origin: bottom; transform: rotateX(-179deg); z-index: 3; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .fold-bottom { transform-origin: top; transform: rotateX(179deg); z-index: 3; border-top: 1px solid rgba(0,0,0,0.05); }

        .card-container.unfolded .fold-top { transform: rotateX(0deg); }
        .card-container.unfolded .fold-bottom { transform: rotateX(0deg); }

        /* --- MAIN CARD CONTENT (Center Fold) --- */
        .card-content {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            background-color: var(--champagne);
            overflow-y: auto; scrollbar-width: none;
            padding: 40px 20px; text-align: center;
            box-shadow: 0 20px 70px rgba(0,0,0,0.15);
        }
        .card-content::-webkit-scrollbar { display: none; }

        .guest-welcome { font-size: 0.8rem; letter-spacing: 2px; color: var(--gold); font-weight: 600; margin-bottom: 10px; }
        
        /* SPECULAR SHINE ON NAMES */
        .main-names { 
            font-family: 'Great Vibes', cursive; font-size: clamp(3.2rem, 11vw, 4.8rem); 
            margin: 15px 0 0px; font-weight: 300;
            background: linear-gradient(135deg, var(--emerald) 45%, #fff 50%, var(--emerald) 55%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s infinite linear;
        }
        @keyframes shine { 0% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }

        .weds-text { font-size: 1.8rem; color: var(--gold); display: block; margin: -10px 0; font-weight: 300; -webkit-text-fill-color: var(--gold); }
        
        .couple-illustration { 
            width: 100%; max-width: 450px; 
            margin: -10px auto 10px; 
            position: relative; top: -10px;
        }
        .couple-illustration img { width: 100%; height: auto; mix-blend-mode: multiply; }

        .scratch-box {
            position: relative; width: 320px; height: 160px; margin: 20px auto;
            border-radius: 20px; overflow: hidden; background: #fff; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }
        #scratch-canvas { position: absolute; inset: 0; z-index: 2; cursor: crosshair; }
        .revealed-content { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        #marriage-text { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--emerald); opacity: 0; transition: 1s; }
        #wedding-date-revealed { font-size: 1rem; letter-spacing: 3px; color: var(--gold); font-weight: 600; opacity: 0; transition: 1s; }

        .timer { display: flex; justify-content: center; gap: 15px; margin-top: 10px; opacity: 0; transition: 1s; }
        .timer-unit span { display: block; font-size: 1.4rem; font-weight: 300; color: var(--emerald); }
        .timer-unit label { font-size: 0.5rem; color: var(--gold); text-transform: uppercase; }

        .btn {
            display: inline-block; margin: 10px 0; padding: 15px 30px; 
            background: var(--emerald); color: var(--champagne); text-decoration: none; 
            font-size: 0.75rem; letter-spacing: 2px; font-weight: 600;
            border-radius: 50px; width: 100%; max-width: 280px;
        }

        .details-text { font-size: 0.9rem; line-height: 2; color: var(--soft-text); margin-top: 40px; padding-top: 30px; border-top: 1px solid #eee; }
        .thank-you { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--gold); margin-top: 20px; }

        /* Fold Overlay Instructions */
        .unfold-instruction {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
            background: var(--champagne); z-index: 10; cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <div id="lantern-field"></div>

    <div class="wrapper">
        <div class="envelope" id="envelope" onclick="openInv()">
            <div class="envelope-flap"></div>
            <div class="seal">
                <img src="https://drive.google.com/thumbnail?id=1beQfliXqIi0uLmmmbHoGIh6n1jwslWDW&sz=s1000" alt="Seal Logo">
            </div>
            <p style="position: absolute; bottom: 35px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.7rem; letter-spacing: 5px;">TAP TO OPEN</p>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="fold fold-top" id="foldTop">
                <div class="unfold-instruction" id="topInstr">Swipe Up</div>
            </div>
            
            <div class="fold" style="height: 100%;">
                <div class="card-content" id="mainCard">
                    <p class="guest-welcome" id="guestNameDisplay"></p>
                    <div class="card-header-logo">
                        <img src="https://drive.google.com/thumbnail?id=1beQfliXqIi0uLmmmbHoGIh6n1jwslWDW&sz=s1000" alt="Logo">
                    </div>
                    <h1 class="main-names">Vara Kumar<span class="weds-text">weds</span>Sushma</h1>
                    <div class="couple-illustration">
                        <img src="https://drive.google.com/thumbnail?id=1KDBHXqWuMNwxyMCfeEOarIyCsQM9cu2J&sz=s1000" alt="Illustration">
                    </div>
                    <div class="scratch-box">
                        <canvas id="scratch-canvas" width="320" height="160"></canvas>
                        <div class="revealed-content">
                            <p id="marriage-text">We are getting married!</p>
                            <span id="wedding-date-revealed">MAY 03, 2026</span>
                            <div class="timer" id="timer">
                                <div class="timer-unit"><span id="days">00</span><label>Days</label></div>
                                <div class="timer-unit"><span id="hours">00</span><label>Hrs</label></div>
                                <div class="timer-unit"><span id="mins">00</span><label>Mins</label></div>
                            </div>
                        </div>
                    </div>
                    <a href="https://maps.app.goo.gl/6" target="_blank" class="btn">VIEW LOCATION</a>
                    <div class="details-text">
                        <strong style="color: var(--emerald);">DINNER RECEPTION</strong><br>
                        Sunday, May 3 • 7:00 PM<br>
                        PVK Prime Conventions, Gajuwaka
                    </div>
                    <div class="thank-you">With Love</div>
                </div>
            </div>

            <div class="fold fold-bottom" id="foldBottom">
                <div class="unfold-instruction" id="bottomInstr">Swipe Down</div>
            </div>
        </div>
    </div>

    <script>
        // 1. PERSONALIZATION
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('guest');
        if (guestName) document.getElementById('guestNameDisplay').innerText = `Hi ${guestName}, join us for...`;

        // 2. PARALLAX TILT
        const cardContainer = document.getElementById('cardContainer');
        document.addEventListener('mousemove', (e) => {
            if(!cardContainer.classList.contains('unfolded')) return;
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            cardContainer.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.addEventListener('deviceorientation', (e) => {
            if(!cardContainer.classList.contains('unfolded')) return;
            const rX = Math.min(Math.max(e.beta - 70, -10), 10);
            const rY = Math.min(Math.max(e.gamma, -10), 10);
            cardContainer.style.transform = `translate(-50%, -50%) rotateX(${-rX}deg) rotateY(${rY}deg)`;
        });

        // 3. FADE-IN MUSIC & OPENING
        function openInv() {
            const music = document.getElementById('bgMusic');
            music.volume = 0;
            music.play().catch(()=>{});
            let vol = 0;
            const fadeIn = setInterval(() => {
                if (vol < 0.2) { vol += 0.01; music.volume = vol; }
                else clearInterval(fadeIn);
            }, 100);

            document.getElementById('envelope').classList.add('open');
            setTimeout(() => {
                cardContainer.classList.add('reveal');
                initUnfold();
            }, 800);
        }

        // 4. MULTI-STEP UNFOLD
        function initUnfold() {
            let topOpened = false, bottomOpened = false;
            
            document.getElementById('foldTop').onclick = () => {
                document.getElementById('foldTop').style.transform = 'rotateX(0deg) translateY(-100%)';
                document.getElementById('topInstr').style.opacity = '0';
                topOpened = true; checkAllOpened();
            };
            document.getElementById('foldBottom').onclick = () => {
                document.getElementById('foldBottom').style.transform = 'rotateX(0deg) translateY(100%)';
                document.getElementById('bottomInstr').style.opacity = '0';
                bottomOpened = true; checkAllOpened();
            };

            function checkAllOpened() {
                if(topOpened && bottomOpened) {
                    cardContainer.classList.add('unfolded');
                    setTimeout(initScratch, 500);
                }
            }
        }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            let revealed = false;
            
            ctx.fillStyle = '#c5a059';
            ctx.fillRect(0,0,320,160);

            function scratch(e) {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();

                // 5. HAPTIC FEEDBACK
                if(window.navigator.vibrate) window.navigator.vibrate(10);

                const data = ctx.getImageData(0,0,320,160).data;
                let count = 0;
                for(let i=3; i<data.length; i+=4) if(data[i] === 0) count++;
                if(count > (320*160*0.65) && !revealed) {
                    revealed = true;
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    document.getElementById('marriage-text').style.opacity = 1;
                    document.getElementById('wedding-date-revealed').style.opacity = 1;
                    document.getElementById('timer').style.opacity = 1;
                    startTimer();
                }
            }

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', () => isDrawing = true);
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
        }

        function startTimer() {
            const target = new Date("May 3, 2026 19:00:00").getTime();
            setInterval(() => {
                const d = target - new Date().getTime();
                document.getElementById('days').innerText = Math.floor(d/86400000);
                document.getElementById('hours').innerText = Math.floor((d%86400000)/3600000);
                document.getElementById('mins').innerText = Math.floor((d%3600000)/60000);
            }, 1000);
        }

        // Lanterns
        const field = document.getElementById('lantern-field');
        for(let i=0; i<12; i++){
            const l = document.createElement('div');
            l.className = 'lantern';
            l.style.width = l.style.height = (Math.random()*6+4)+'px';
            l.style.left = Math.random()*100+'vw';
            l.style.setProperty('--d', (Math.random()*10+20)+'s');
            field.appendChild(l);
        }
    </script>
</body>
</html>
